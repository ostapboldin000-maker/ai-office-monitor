name: Monitor AI Office

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check myaioffice.ru
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://myaioffice.ru)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Site is UP"
          else
            echo "Site is DOWN (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Send Telegram alert
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=🔴 AI Office НЕДОСТУПЕН%0Ahttps://myaioffice.ru не отвечает%0AВремя: $(date '+%H:%M %d.%m.%Y UTC')"
