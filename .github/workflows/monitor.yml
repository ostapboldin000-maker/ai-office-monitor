name: Monitor AI Office

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check myaioffice.ru
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://myaioffice.ru)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Site is UP"
          else
            echo "Site is DOWN (HTTP $HTTP_STATUS)"
            exit 1
          fi
               - name: Send Telegram alert
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🔴 AI Office НЕДОСТУПЕН

https://myaioffice.ru не отвечает
Время: $(date '+%H:%M %d.%m.%Y UTC')

Проверь VPS: ssh root@45.145.6.48"
